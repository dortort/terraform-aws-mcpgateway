name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"
      - name: Terraform Format
        run: terraform fmt -check -recursive

  validate:
    name: Validate (${{ matrix.directory }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - "."
          - "examples/eks_minimal"
          - "examples/ecs_full"
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.directory }}
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.directory }}

  test:
    name: Terraform Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Test
        run: terraform test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_path: examples
          skip_check: CKV_TF_1,CKV2_AWS_19,CKV2_AWS_27,CKV2_AWS_76,CKV_K8S_8,CKV_K8S_9,CKV_K8S_10,CKV_K8S_11,CKV_K8S_12,CKV_K8S_13,CKV_K8S_15,CKV_K8S_16,CKV_K8S_17,CKV_K8S_18,CKV_K8S_19,CKV_K8S_20,CKV_K8S_21,CKV_K8S_22,CKV_K8S_25,CKV_K8S_26,CKV_K8S_27,CKV_K8S_28,CKV_K8S_29,CKV_K8S_30,CKV_K8S_34,CKV_K8S_37,CKV_K8S_39,CKV_K8S_44,CKV_K8S_159
